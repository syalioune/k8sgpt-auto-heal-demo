# K8sGPT instance — deployed after the operator is ready.
# The ANTHROPIC_MODEL placeholder is replaced by envsubst during setup.
apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt-anthropic
  namespace: k8sgpt-operator-system
spec:
  ai:
    enabled: true
    backend: anthropic
    model: ${ANTHROPIC_MODEL}
    secret:
      name: k8sgpt-anthropic-secret
      key: anthropic-api-key
    anonymized: false
  noCache: false
  version: v0.4.25
  repository: ghcr.io/k8sgpt-ai/k8sgpt
  # Filter which resource types K8sGPT should analyze
  filters:
    - Pod
    - Service
    - Deployment
    - ReplicaSet
    - PersistentVolumeClaim
    - Ingress
    - StatefulSet
    - CronJob
    - Node
  # Scan every 2 minutes for the demo (production: 5-10m)
  analysis:
    interval: 2m
