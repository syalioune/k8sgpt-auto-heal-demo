apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8sgpt-operator
  namespace: k8sgpt-operator-system
spec:
  interval: 10m
  chart:
    spec:
      chart: k8sgpt-operator
      sourceRef:
        kind: HelmRepository
        name: k8sgpt
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  timeout: 10m
