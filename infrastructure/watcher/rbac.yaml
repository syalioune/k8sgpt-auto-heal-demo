---
apiVersion: v1
kind: Namespace
metadata:
  name: k8sgpt-auto-heal

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auto-heal-watcher
  namespace: k8sgpt-auto-heal

---
# Read K8sGPT Result CRDs + patch annotations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: auto-heal-watcher
rules:
  # Watch and annotate K8sGPT Results
  - apiGroups: ["core.k8sgpt.ai"]
    resources: ["results"]
    verbs: ["get", "list", "watch", "patch"]
  # Read pod specs, logs, and status
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  # Read events for context
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  # Read services and endpoints
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list"]
  # Read deployments, replicasets, statefulsets
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list"]
  # Read ingresses
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  # Read PVCs
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  # Read nodes (for node-level issues)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Read Flux CRDs (trace, inventory lookup, source status)
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories", "ocirepositories", "buckets", "helmrepositories", "helmcharts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["notification.toolkit.fluxcd.io"]
    resources: ["alerts", "providers", "receivers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["image.toolkit.fluxcd.io"]
    resources: ["imagerepositories", "imagepolicies", "imageupdateautomations"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: auto-heal-watcher
subjects:
  - kind: ServiceAccount
    name: auto-heal-watcher
    namespace: k8sgpt-auto-heal
roleRef:
  kind: ClusterRole
  name: auto-heal-watcher
  apiGroup: rbac.authorization.k8s.io
