---
apiVersion: v1
kind: Namespace
metadata:
  name: k8sgpt-auto-heal

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auto-heal-watcher
  namespace: k8sgpt-auto-heal

---
# Read K8sGPT Result CRDs + patch annotations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: auto-heal-watcher
rules:
  # Watch and annotate K8sGPT Results
  - apiGroups: ["core.k8sgpt.ai"]
    resources: ["results"]
    verbs: ["get", "list", "watch", "patch"]
  # Read pod specs, logs, and status
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  # Read events for context
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  # Read services and endpoints
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list"]
  # Read deployments, replicasets, statefulsets
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list"]
  # Read ingresses
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  # Read PVCs
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  # Read nodes (for node-level issues)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: auto-heal-watcher
subjects:
  - kind: ServiceAccount
    name: auto-heal-watcher
    namespace: k8sgpt-auto-heal
roleRef:
  kind: ClusterRole
  name: auto-heal-watcher
  apiGroup: rbac.authorization.k8s.io
