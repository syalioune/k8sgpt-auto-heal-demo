# Intentionally broken: nginx needs to write to /var/cache/nginx and /var/run
# but readOnlyRootFilesystem prevents this -> CrashLoopBackOff
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-broken
  namespace: k8sgpt-cli-demo
  labels:
    app: nginx-broken
    scenario: readonly-filesystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-broken
  template:
    metadata:
      labels:
        app: nginx-broken
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          securityContext:
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
