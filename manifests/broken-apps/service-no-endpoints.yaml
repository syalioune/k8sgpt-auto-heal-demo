# Intentionally broken: Service selector doesn't match any pod labels
# → Service has no endpoints
apiVersion: v1
kind: Service
metadata:
  name: ghost-service
  namespace: demo-apps
  labels:
    scenario: no-endpoints
spec:
  selector:
    app: ghost-app-that-does-not-exist
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
