apiVersion: v1
kind: Pod
metadata:
  name: demo-app
  namespace: demo-apps
  labels:
    app: demo
  annotations:
    description: "Demo application pod"
spec:
  containers:
    - name: demo-container
      image: demo-image:latest
      volumeMounts:
        - name: ca-certificates
          mountPath: /etc/ssl/certs/kube-root-ca.crt
          subPath: kube-root-ca.crt
  volumes:
    - name: ca-certificates
      configMap:
        name: kube-root-ca.crt
  securityContext:
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 2000
  restartPolicy: Always