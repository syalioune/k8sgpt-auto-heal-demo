apiVersion: v1
kind: Pod
metadata:
  name: auto-heal-watcher
  namespace: k8sgpt-auto-heal
  labels:
    app: auto-heal-watcher
spec:
  containers:
  - name: watcher
    image: auto-heal-watcher:local
    imagePullPolicy: IfNotPresent
    env:
    - name: K8SGPT_NAMESPACE
      value: k8sgpt-operator-system
    - name: FLEET_APPS_PATH
      value: apps/k8sgpt-demo
    - name: LOG_LEVEL
      value: INFO
    - name: DRY_RUN
      value: 'false'
    envFrom:
    - secretRef:
        name: auto-heal-secrets
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 1000
    terminationMessagePath: /dev/termination-log
    terminationMessagePolicy: File
  dnsPolicy: ClusterFirst
  restartPolicy: Always
  serviceAccountName: auto-heal-watcher
  terminationGracePeriodSeconds: 30
  volumes:
  - name: kube-api-access-nppxj
    projected:
      defaultMode: 420
      sources:
      - serviceAccountToken:
          expirationSeconds: 3607
          path: token
      - configMap:
          items:
          - key: ca.crt
            path: ca.crt
          name: kube-root-ca.crt
      - downwardAPI:
          items:
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
            path: namespace