apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-apiserver-legacy-service-account-token-tracking
  namespace: kube-system
  deletionTimestamp: null
  finalizers: []  # Marking as removed; finalizer handling will depend on the cluster's garbage collection logic
  annotations:
    kubernetes.io/legacy-unknown: "true"  # Preserving annotation but no other resources use this.
data: {}  # Empty data as placeholder for deletion purposes. A proper deletion will need no data.