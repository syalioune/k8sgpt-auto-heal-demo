apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-broken
  namespace: demo-apps
  labels:
    app: nginx-broken
    scenario: readonly-filesystem
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-broken
  template:
    metadata:
      labels:
        app: nginx-broken
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
          securityContext:
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi